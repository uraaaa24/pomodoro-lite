<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomodoro Lite</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body class="min-h-screen min-w-80 bg-[#f7f7f5] font-sans text-[#2f302e] antialiased">
    <main class="grid min-h-screen place-items-center px-5 py-8" aria-labelledby="app-title">
      <section class="w-full max-w-[360px] px-2 py-3 text-center" aria-live="polite">
        <header class="mb-8">
          <p class="mb-2 text-xs font-medium uppercase tracking-[0.18em] text-[#8a8d88]">Pomodoro Lite</p>
          <h1 id="app-title" class="text-base font-medium tracking-[-0.01em] text-[#333432]">Quiet timer for deep work</h1>
        </header>

        <div class="mb-7 rounded-full bg-white p-1" role="tablist" aria-label="Timer modes">
          <button class="mode-tab rounded-full bg-[#C8E6D2] px-4 py-2 text-xs font-medium text-[#2f302e]" type="button" data-mode="focus">Focus</button>
          <button class="mode-tab rounded-full bg-transparent px-4 py-2 text-xs font-medium text-[#8a8d88]" type="button" data-mode="shortBreak">Short</button>
          <button class="mode-tab rounded-full bg-transparent px-4 py-2 text-xs font-medium text-[#8a8d88]" type="button" data-mode="longBreak">Long</button>
        </div>

        <p class="mb-4 text-sm font-medium text-[#8a8d88]" id="session-label">Focus Session</p>
        <time class="mb-7 block font-mono text-[clamp(4.75rem,24vw,6.75rem)] font-light leading-none tracking-[-0.08em] text-[#222222]" id="time-display" datetime="PT25M">25:00</time>

        <div class="mx-auto mb-8 h-1 w-full max-w-[300px] overflow-hidden rounded-full bg-white" aria-hidden="true">
          <div class="h-full w-0 rounded-full bg-[#A8D5BA] transition-[width] duration-300 ease-out" id="progress-bar"></div>
        </div>

        <div class="flex items-center justify-center gap-3" aria-label="Timer controls">
          <button class="min-w-28 rounded-2xl bg-[#C8E6D2] px-5 py-3 text-sm font-medium text-[#2f302e] transition-colors hover:bg-[#B7DFC8] focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-4 focus-visible:outline-[#A8D5BA]" id="toggle-button" type="button">Start</button>
          <button class="rounded-2xl border border-[#e4e4e0] bg-transparent px-5 py-3 text-sm font-medium text-[#62645f] transition-colors hover:border-[#C8E6D2] hover:text-[#2f302e] focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-4 focus-visible:outline-[#A8D5BA]" id="reset-button" type="button">Reset</button>
        </div>
      </section>
    </main>
  </body>
</html>
