<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomodoro Lite</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <main class="app-shell" aria-labelledby="app-title">
      <section class="timer-card" aria-live="polite">
        <header class="app-header">
          <div>
            <p class="eyebrow">Pomodoro Lite</p>
            <h1 id="app-title">Quiet Focus</h1>
          </div>
          <p class="app-note">A calm rhythm for focus and rest.</p>
        </header>

        <div class="mode-tabs" role="tablist" aria-label="Timer modes">
          <button class="mode-tab active" type="button" data-mode="focus">Focus</button>
          <button class="mode-tab" type="button" data-mode="shortBreak">Short</button>
          <button class="mode-tab" type="button" data-mode="longBreak">Long</button>
        </div>

        <div class="timer-face">
          <p class="session-label" id="session-label">Focus Session</p>
          <time class="time-display" id="time-display" datetime="PT25M">25:00</time>
          <div class="progress-track" aria-hidden="true">
            <div class="progress-bar" id="progress-bar"></div>
          </div>
        </div>

        <div class="controls" aria-label="Timer controls">
          <button class="primary-button" id="toggle-button" type="button">Start</button>
          <button class="secondary-button" id="reset-button" type="button">Reset</button>
          <button class="secondary-button" id="skip-button" type="button">Skip</button>
        </div>

        <section class="dashboard" aria-label="Pomodoro status">
          <article class="stat-card">
            <span class="stat-value" id="completed-count">0</span>
            <span class="stat-label">Done</span>
          </article>
          <article class="stat-card">
            <span class="stat-value" id="cycle-count">1 / 4</span>
            <span class="stat-label">Cycle</span>
          </article>
          <article class="stat-card">
            <span class="stat-value next-value" id="next-session">Short Break</span>
            <span class="stat-label">Next</span>
          </article>
        </section>

        <section class="settings-card" aria-labelledby="settings-title">
          <div class="settings-heading">
            <p class="eyebrow">Settings</p>
            <h2 id="settings-title">Time</h2>
          </div>
          <form class="settings-grid" id="settings-form">
            <label>
              Focus
              <input id="focus-minutes" name="focus" type="number" min="1" max="120" value="25" aria-label="Focus minutes" />
            </label>
            <label>
              Short
              <input id="short-break-minutes" name="shortBreak" type="number" min="1" max="60" value="5" aria-label="Short break minutes" />
            </label>
            <label>
              Long
              <input id="long-break-minutes" name="longBreak" type="number" min="1" max="90" value="15" aria-label="Long break minutes" />
            </label>
          </form>
        </section>
      </section>
    </main>
  </body>
</html>
